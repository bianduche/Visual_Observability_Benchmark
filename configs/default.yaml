# Default Configuration for Visual Observability Benchmark

# Paths
gt_folder: "./data/sample_images"
output_folder: "./output"

# Model settings
scale: 4
device: null  # null means auto-detect (cuda if available, else cpu)

# Degradation settings
degradation_type: "classical"  # 'classical' or 'realworld'
blur_sigma: null
noise_sigma: null

# Observability parameters
observability_alpha: 1.0
observability_beta: 0.5

# Processing settings
batch_size: 1
num_workers: 0
prefetch_factor: null

# Model-specific settings
swinir_model_type: "classical"
swinir_tile_size: 0
nafnet_width: 32
nafnet_n_blocks: 8
nafnet_task: "denoise"
diffbir_diffusion_steps: 50
diffbir_cfg_scale: 1.5

# Output settings
save_degraded: true
save_gt: true
save_restored: true
save_observability: true
save_metadata: true
observability_colormap: "jet"

# Logging
log_file: "visual_observability_benchmark.log"
log_level: "INFO"
show_progress: true
